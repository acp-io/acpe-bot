# Automatic canary version bump on push to main.
#
# Triggered by every push to main (excluding package.json and lockfile changes
# to prevent infinite loops from the bump commit itself).
#
# Prerequisites:
#   - acpe-bot is installed in the org (via github.com/apps/acpe-bot)
#   - The workflow has `id-token: write` permission
#
# Flow:
#   1. Generate acpe-bot token via OIDC (no secrets needed)
#   2. Checkout with full history
#   3. Run bump script (conventional commit -> semver prerelease)
#   4. Push version bump commit to main
#   5. Create GitHub pre-release with auto-generated notes

name: Bump canary

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/package.json"
      - "**/pnpm-lock.yaml"

permissions:
  id-token: write
  contents: write

jobs:
  bump-canary:
    name: Bump canary
    runs-on: ubuntu-latest

    steps:
      - name: Generate acpe-bot token
        id: acpe-bot-token
        uses: acp-io/acpe-bot@main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.acpe-bot-token.outputs.token }}

      - name: Configure git user
        run: |
          git config --local user.name "acpe-bot[bot]"
          git config --local user.email "263902341+acpe-bot[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: true

      - name: Run bump script
        run: pnpm run bump --from-commit --type prerelease

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ steps.acpe-bot-token.outputs.token }}
          branch: ${{ github.ref_name }}

      - name: Get new version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: pnpm run release:notes --github-output

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ steps.acpe-bot-token.outputs.token }}
          tag_name: ${{ steps.get-version.outputs.tag }}
          name: ${{ steps.get-version.outputs.tag }}
          prerelease: true
          body: ${{ steps.release-notes.outputs.notes }}
